  not RFC 9457 application/problem+json. These are the common error types the
  service may return, transcribed from the AWS CloudHSM API Reference. Action-
  specific errors (e.g. CloudHsmAccessDeniedException, CloudHsmInternalFailureException,
  CloudHsmInvalidRequestException, CloudHsmResourceNotFoundException,
  CloudHsmServiceException, CloudHsmTagException) are documented per operation.
