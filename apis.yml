aid: amazon-cloudhsm
name: Amazon CloudHSM
description: >-
  AWS CloudHSM is a cloud-based hardware security module (HSM) that enables you to manage cryptographic keys on dedicated FIPS 140-2 Level 3 validated, single-tenant HSM instances running within your own
  VPC for regulatory compliance and data security.
