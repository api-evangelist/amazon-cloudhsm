naftiko: "1.0.0-alpha1"

info:
  label: "Amazon CloudHSM"
  description: "API for creating and managing CloudHSM clusters and HSM instances for dedicated hardware-based cryptographic key management."
  tags:
    - Amazon Web Services
    - Amazon CloudHSM
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: cloudhsm
      baseUri: https://cloudhsm.us-east-1.amazonaws.com
      description: "Amazon CloudHSM API."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources: []

  exposes:
    - type: rest
      port: 8100
      namespace: cloudhsm-rest
      resources: []

    - type: mcp
      port: 9100
      namespace: cloudhsm-mcp
      transport: http
      tools: []
